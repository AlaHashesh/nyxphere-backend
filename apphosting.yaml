# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run.
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: NEXTAUTH_URL
    value: https://backend.nyxphere.com
  - variable: STRIPE_PRICE_LIFETIME
    value: lifetime
  - variable: STRIPE_PRICE_YEARLY
    value: 1 year

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: FIREBASE_WEB_API_KEY
    secret: FIREBASE_WEB_API_KEY
  - variable: AUTH_SECRET
    secret: AUTH_SECRET
  - variable: AUTH_SALT
    secret: AUTH_SALT
  - variable: GOOGLE_CLIENT_ID_SERVER
    secret: GOOGLE_CLIENT_ID_SERVER
  - variable: ADAPTY_SECRET_KEY
    secret: ADAPTY_SECRET_KEY
